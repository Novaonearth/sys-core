<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SysCore — Systems Engineering Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">SE</div>
    <div class="app-name">SysCore</div>
    <div class="divider-v"></div>
    <div id="breadcrumb" class="breadcrumb"><span class="bc-current">Products</span></div>
  </div>
  <div class="topbar-right">
    <span class="badge badge-warn" id="review-badge">— reviews pending</span>
    <span class="badge badge-info">v2.4.1</span>
    <div class="avatar">JD</div>
  </div>
</div>
<div id="page-home" class="page active">
  <div>
    <div class="section-label"><span>Products</span><button class="btn-add-card" onclick="openModal('product')">+ New product</button></div>
    <div class="product-grid" id="product-grid"></div>
  </div>
  <div>
    <div class="section-label"><span>Supporting products</span><button class="btn-add-card" onclick="openModal('support')">+ New support system</button></div>
    <div class="support-grid" id="support-grid"></div>
  </div>
</div>
<div id="page-detail" class="page">
  <div class="detail-header" id="detail-header"></div>
  <div><div class="tabs" id="detail-tabs"></div><div id="detail-tab-panels"></div></div>
</div>
<div class="modal-overlay" id="modal-product">
  <div class="modal">
    <div><div class="modal-title">Add new product</div><div class="modal-sub">Define a new main product or vehicle variant.</div></div>
    <div class="form-row"><label>Product name</label><input type="text" id="mp-name" placeholder="e.g. Rocket — Type 3"/></div>
    <div class="form-2col">
      <div class="form-row"><label>Category / type</label><input type="text" id="mp-type" placeholder="e.g. Launch vehicle · Orbital"/></div>
      <div class="form-row"><label>Status</label><select id="mp-status"><option>Draft</option><option>Planned</option><option>Active</option><option>In review</option></select></div>
    </div>
    <div class="form-row"><label>Icon</label>
      <div class="modal-emoji-row" id="mp-emoji-row">
        <div class="emoji-opt selected" data-e="🚀" onclick="pickEmoji('mp',this)">🚀</div>
        <div class="emoji-opt" data-e="🛰" onclick="pickEmoji('mp',this)">🛰</div>
        <div class="emoji-opt" data-e="⚙️" onclick="pickEmoji('mp',this)">⚙️</div>
        <div class="emoji-opt" data-e="🔬" onclick="pickEmoji('mp',this)">🔬</div>
        <div class="emoji-opt" data-e="🛸" onclick="pickEmoji('mp',this)">🛸</div>
        <div class="emoji-opt" data-e="🔩" onclick="pickEmoji('mp',this)">🔩</div>
        <div class="emoji-opt" data-e="🛡️" onclick="pickEmoji('mp',this)">🛡️</div>
        <div class="emoji-opt" data-e="🧪" onclick="pickEmoji('mp',this)">🧪</div>
      </div>
    </div>
    <div class="form-row"><label>Color accent</label>
      <div class="color-row" id="mp-color-row">
        <div class="color-opt selected" data-c="blue" style="background:#378ADD" onclick="pickColor('mp',this)"></div>
        <div class="color-opt" data-c="green" style="background:#639922" onclick="pickColor('mp',this)"></div>
        <div class="color-opt" data-c="amber" style="background:#BA7517" onclick="pickColor('mp',this)"></div>
        <div class="color-opt" data-c="teal" style="background:#1D9E75" onclick="pickColor('mp',this)"></div>
        <div class="color-opt" data-c="purple" style="background:#7F77DD" onclick="pickColor('mp',this)"></div>
        <div class="color-opt" data-c="coral" style="background:#D85A30" onclick="pickColor('mp',this)"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('product')">Cancel</button>
      <button class="btn-confirm" onclick="submitProduct()">Add product</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-support">
  <div class="modal">
    <div><div class="modal-title">Add new support system</div><div class="modal-sub">Define a new supporting product or infrastructure system.</div></div>
    <div class="form-row"><label>System name</label><input type="text" id="ms-name" placeholder="e.g. Fuel storage system"/></div>
    <div class="form-2col">
      <div class="form-row"><label>Category</label><input type="text" id="ms-type" placeholder="e.g. Ground infrastructure"/></div>
      <div class="form-row"><label>Status</label><select id="ms-status"><option>Draft</option><option>Planned</option><option>In review</option><option>Ready</option></select></div>
    </div>
    <div class="form-row"><label>Supports</label><input type="text" id="ms-supports" placeholder="e.g. all products, Rocket Type 1"/></div>
    <div class="form-row"><label>Icon</label>
      <div class="modal-emoji-row" id="ms-emoji-row">
        <div class="emoji-opt selected" data-e="🏗" onclick="pickEmoji('ms',this)">🏗</div>
        <div class="emoji-opt" data-e="📦" onclick="pickEmoji('ms',this)">📦</div>
        <div class="emoji-opt" data-e="⛽" onclick="pickEmoji('ms',this)">⛽</div>
        <div class="emoji-opt" data-e="🔌" onclick="pickEmoji('ms',this)">🔌</div>
        <div class="emoji-opt" data-e="🏭" onclick="pickEmoji('ms',this)">🏭</div>
        <div class="emoji-opt" data-e="🛢️" onclick="pickEmoji('ms',this)">🛢️</div>
        <div class="emoji-opt" data-e="🔧" onclick="pickEmoji('ms',this)">🔧</div>
        <div class="emoji-opt" data-e="📡" onclick="pickEmoji('ms',this)">📡</div>
      </div>
    </div>
    <div class="form-row"><label>Color accent</label>
      <div class="color-row" id="ms-color-row">
        <div class="color-opt" data-c="blue" style="background:#378ADD" onclick="pickColor('ms',this)"></div>
        <div class="color-opt selected" data-c="amber" style="background:#BA7517" onclick="pickColor('ms',this)"></div>
        <div class="color-opt" data-c="teal" style="background:#1D9E75" onclick="pickColor('ms',this)"></div>
        <div class="color-opt" data-c="purple" style="background:#7F77DD" onclick="pickColor('ms',this)"></div>
        <div class="color-opt" data-c="coral" style="background:#D85A30" onclick="pickColor('ms',this)"></div>
        <div class="color-opt" data-c="green" style="background:#639922" onclick="pickColor('ms',this)"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('support')">Cancel</button>
      <button class="btn-confirm" onclick="submitSupport()">Add system</button>
    </div>
  </div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
